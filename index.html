<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>System App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f0fdfa; font-family: 'Sarabun', sans-serif; }
    .calendar-card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px rgba(20,184,166,0.15); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    
    .cell { min-height: 100px; border: 2px solid #2dd4bf; position: relative; cursor: pointer; transition: 0.2s; }
    @media (min-width: 768px) { .cell { min-height: 150px; } }
    
    .cell:hover { background-color: #e0f2f1; z-index: 5; }
    .cell.today { background-color: #f0fdfa; border: 4px solid #0d9488 !important; }
    .cell.weekend { background-color: #f1f5f9; border-color: #99f6e4; }

    .badge-sukanya { border-left: 5px solid #f472b6; background: #fdf2f8; color: #be185d; }
    .badge-oomaree { border-left: 5px solid #3b82f6; background: #eff6ff; color: #1d4ed8; }
    
    .event-badge { font-size: 11px; padding: 4px 6px; border-radius: 8px; margin-bottom: 4px; font-weight: 600; line-height: 1.2; }
    @media (min-width: 768px) { .event-badge { font-size: 14px; } }
    
    .modal-close { cursor: pointer; transition: 0.3s; }
    .modal-close:hover { color: #f43f5e; transform: rotate(90deg); }
  </style>
</head>
<body class="p-2 md:p-6 pb-20">

  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <div class="flex items-center gap-4">
        <div class="bg-teal-600 w-12 h-12 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg">
          <i class="fas fa-stethoscope"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-800">Registry System</h1>
          <p class="text-xs text-teal-600 font-bold" id="currentDateDisplay"></p>
        </div>
      </div>

      <div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border-2 border-teal-200">
        <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-xl hover:bg-teal-100 flex items-center justify-center text-teal-600"><i class="fas fa-chevron-left"></i></button>
        <h2 id="monthTitle" class="text-lg font-bold text-slate-700 min-w-[150px] text-center uppercase">...</h2>
        <button onclick="changeMonth(1)" class="w-10 h-10 rounded-xl hover:bg-teal-100 flex items-center justify-center text-teal-600"><i class="fas fa-chevron-right"></i></button>
        <div class="h-6 w-[2px] bg-teal-100 mx-2"></div>
        <button onclick="openEditForm()" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2 rounded-xl text-sm font-bold flex items-center gap-2">
          <i class="fas fa-edit"></i> จัดการเวร
        </button>
      </div>
    </div>

    <div class="mb-6 bg-teal-50 border-4 border-teal-400 p-5 rounded-[2rem] flex flex-col md:flex-row items-center justify-center gap-3 shadow-lg">
      <span class="text-teal-700 font-extrabold text-lg"><i class="fas fa-user-md mr-2"></i> แพทย์เวร Consult ประจำเดือน:</span>
      <span id="monthlyDoctor" class="text-2xl text-teal-800 font-black uppercase underline decoration-teal-300">Loading...</span>
    </div>

    <div class="calendar-card overflow-hidden border-2 border-teal-200">
      <div class="calendar-grid bg-teal-50 border-b-2 border-teal-200">
        <div class="py-4 text-center text-xs font-black text-slate-500 uppercase">จันทร์</div>
        <div class="py-4 text-center text-xs font-black text-slate-500 uppercase">อังคาร</div>
        <div class="py-4 text-center text-xs font-black text-slate-500 uppercase">พุธ</div>
        <div class="py-4 text-center text-xs font-black text-slate-500 uppercase">พฤหัสบดี</div>
        <div class="py-4 text-center text-xs font-black text-slate-500 uppercase">ศุกร์</div>
        <div class="py-4 text-center text-xs font-black text-indigo-500 uppercase">เสาร์</div>
        <div class="py-4 text-center text-xs font-black text-rose-500 uppercase">อาทิตย์</div>
      </div>
      <div id="calendarDays" class="calendar-grid"></div>
    </div>

    <div class="mt-16 bg-white rounded-[2.5rem] p-8 shadow-xl border-4 border-teal-50">
      <div class="flex items-center gap-4 mb-8">
        <div class="bg-teal-600 text-white p-4 rounded-2xl"><i class="fas fa-calendar-alt text-2xl"></i></div>
        <h2 class="text-2xl font-black text-teal-900">Annual Consulting Physician Schedule</h2>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="yearlyDocGrid"></div>
    </div>
  </div>

  <div id="viewModal" class="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-md hidden items-center justify-center p-4">
    <div class="bg-white rounded-[3rem] w-full max-w-sm shadow-2xl relative overflow-hidden">
      <div class="absolute top-6 right-8 text-3xl text-slate-300 modal-close" onclick="closeModal('viewModal')">&times;</div>
      <div class="p-10" id="viewContent"></div>
    </div>
  </div>

  <div id="editModal" class="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-md hidden items-center justify-center p-4">
    <div class="bg-white rounded-[3rem] w-full max-w-md shadow-2xl relative overflow-hidden">
      <div class="absolute top-6 right-8 text-3xl text-slate-300 modal-close" onclick="closeModal('editModal')">&times;</div>
      <div class="p-10">
        <h3 class="text-2xl font-black text-slate-800 mb-8">ลงทะเบียนเวร</h3>
        <form id="editForm" onsubmit="handleSave(event)" class="space-y-5">
          <div>
            <label class="text-xs font-bold text-teal-600 uppercase ml-2 mb-2 block">วันที่ปฏิบัติงาน</label>
            <input type="date" id="f_date_raw" onchange="updateThaiDateDisplay()" required class="w-full bg-slate-50 border-2 border-teal-50 rounded-2xl px-5 py-4 focus:border-teal-500 outline-none font-bold">
            <input type="hidden" id="f_date_thai">
          </div>
          <div>
            <label class="text-xs font-bold text-teal-600 uppercase ml-2 mb-2 block">พยาบาลผู้ปฏิบัติงาน</label>
            <select id="f_name" required class="w-full bg-slate-50 border-2 border-teal-50 rounded-2xl px-5 py-4 outline-none font-bold">
              <option value="สุกัญญา">สุกัญญา (สีชมพู)</option>
              <option value="อ้อมอารีย์">อ้อมอารีย์ (สีน้ำเงิน)</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-bold text-teal-600 uppercase ml-2 mb-2 block">หมายเหตุ (ลา/Vac/อบรม)</label>
            <textarea id="f_note" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม..." class="w-full bg-slate-50 border-2 border-teal-50 rounded-2xl px-5 py-4 outline-none focus:border-teal-500 font-medium"></textarea>
          </div>
          <button type="submit" class="w-full bg-teal-600 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-teal-700 transition-all text-lg">บันทึกข้อมูล</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 🔴 ใส่ลิงก์ Web App จาก Google Apps Script ที่นี่
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbwyCud_OUEQTux-qWApN-MmfC26ApSMecspSy937CpM_sKUxWensNs6XD4ABwYgL-HJ3Q/exec"; 
    // ==========================================

    const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
    let nurseData = [], doctorData = [], currentViewDate = new Date();
    const CONTACTS = { "สุกัญญา": "061-7765604", "อ้อมอารีย์": "094-1843548" };

    window.onload = () => { fetchData(); updateHeaderDate(); };
    function updateHeaderDate() {
      const now = new Date();
      document.getElementById('currentDateDisplay').innerText = `วันนี้: ${now.getDate()} ${thaiMonths[now.getMonth()]} ${now.getFullYear() + 543}`;
    }

    // ฟังก์ชันดึงข้อมูลผ่าน Fetch API (เชื่อมกับ Apps Script โดยตรง)
    async function fetchData() {
      if(!API_URL.includes("script.google.com")) {
        Swal.fire("ข้อผิดพลาด", "กรุณาใส่ลิงก์ API_URL ในโค้ดก่อนใช้งาน", "error");
        return;
      }
      Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading() });
      try {
        const response = await fetch(API_URL + "?action=getData");
        const data = await response.json();
        nurseData = data.nurses; 
        doctorData = data.doctors;
        renderCalendar(); 
        renderYearlyDoctors(); 
        Swal.close();
      } catch (error) {
        console.error(error);
        Swal.fire("เชื่อมต่อล้มเหลว", "ไม่สามารถดึงข้อมูลจากฐานข้อมูลได้", "error");
      }
    }

    function parseThaiDate(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.trim().split(/\s+/);
      if (parts.length < 3) return null;
      const d = parseInt(parts[0]), m = thaiMonths.indexOf(parts[1]), y = parseInt(parts[2]) - 543;
      return new Date(y, m, d);
    }

    function renderCalendar() {
      const daysDiv = document.getElementById('calendarDays');
      daysDiv.innerHTML = '';
      const vY = currentViewDate.getFullYear(), vM = currentViewDate.getMonth();
      const monthYearText = `${thaiMonths[vM]} ${vY + 543}`;
      document.getElementById('monthTitle').innerText = monthYearText;

      const currentDoc = doctorData.find(d => d.monthYear.includes(monthYearText));
      document.getElementById('monthlyDoctor').innerText = currentDoc ? currentDoc.name : "N/A";

      // คำนวณวันแรก (จ-อา)
      let firstDay = new Date(vY, vM, 1).getDay();
      let startOffset = firstDay === 0 ? 6 : firstDay - 1; 

      const daysInMonth = new Date(vY, vM + 1, 0).getDate();
      for (let i = 0; i < startOffset; i++) daysDiv.innerHTML += `<div class="cell bg-slate-50/30 border-0"></div>`;

      for (let day = 1; day <= daysInMonth; day++) {
        const dObj = new Date(vY, vM, day), dow = dObj.getDay();
        const isWE = (dow === 0 || dow === 6), isToday = dObj.toDateString() === new Date().toDateString();
        const dayEvents = nurseData.filter(it => {
          const itD = parseThaiDate(it.date);
          return itD && itD.getDate() === day && itD.getMonth() === vM && itD.getFullYear() === vY;
        });

        daysDiv.innerHTML += `
          <div class="cell p-2 ${isToday ? 'today' : ''} ${isWE ? 'weekend' : ''}" onclick="showDetails(${day}, ${vM}, ${vY})">
            <span class="text-[11px] font-black ${dow === 0 ? 'text-rose-500' : (dow === 6 ? 'text-indigo-500' : 'text-slate-400')}">${day}</span>
            <div class="mt-2">
              ${dayEvents.map(ev => `
                <div class="event-badge ${ev.name === 'สุกัญญา' ? 'badge-sukanya' : 'badge-oomaree'}">
                  ${ev.name}${ev.note ? `<br><span class="text-[9px] font-normal opacity-80 italic">${ev.note}</span>` : ''}
                </div>
              `).join('')}
            </div>
          </div>`;
      }
    }

    function renderYearlyDoctors() {
      const grid = document.getElementById('yearlyDocGrid');
      grid.innerHTML = doctorData.map(doc => `
        <div class="bg-teal-50 border-2 border-teal-100 p-5 rounded-3xl text-center">
          <p class="text-[10px] font-black text-teal-500 uppercase mb-1">${doc.monthYear}</p>
          <p class="text-base font-black text-slate-700">${doc.name}</p>
        </div>`).join('');
    }

    function showDetails(day, month, year) {
      const tDate = `${day} ${thaiMonths[month]} ${year + 543}`;
      const evs = nurseData.filter(it => it.date === tDate);
      let html = `<div class="text-center mb-8"><p class="text-teal-600 font-black text-xl">${tDate}</p></div>`;
      if(evs.length === 0) html += `<p class="text-center text-slate-300 py-10 italic">No On-Call Nurses</p>`;
      else evs.forEach(ev => {
        const phone = CONTACTS[ev.name];
        html += `
          <div class="p-6 rounded-[2rem] ${ev.name === 'สุกัญญา' ? 'bg-pink-50' : 'bg-blue-50'} border-2 border-white shadow-md flex justify-between items-center mb-4">
            <div>
              <p class="font-black text-xl ${ev.name === 'สุกัญญา' ? 'text-pink-700' : 'text-blue-700'}">${ev.name}</p>
              <p class="text-sm text-slate-500 mt-1">${ev.note || 'ปฏิบัติหน้าที่ปกติ'}</p>
            </div>
            <button onclick="confirmCall('${ev.name}', '${phone}')" class="w-14 h-14 rounded-full bg-white text-green-500 shadow-lg flex items-center justify-center hover:scale-110 active:scale-95 transition-all text-xl">
              <i class="fas fa-phone-alt"></i>
            </button>
          </div>`;
      });
      document.getElementById('viewContent').innerHTML = html;
      openModal('viewModal');
    }

    function confirmCall(n, p) {
      Swal.fire({
        title: 'Call Confirmation', text: `คุณต้องการโทรหาคุณ ${n} ใช่หรือไม่?`,
        icon: 'question', showCancelButton: true, confirmButtonColor: '#10b981', confirmButtonText: 'โทรออก', cancelButtonText: 'ยกเลิก',
        customClass: { popup: 'rounded-[2.5rem]' }
      }).then((r) => { if (r.isConfirmed) window.location.href = `tel:${p}`; });
    }

    function openEditForm() {
      const vY = currentViewDate.getFullYear(), vM = String(currentViewDate.getMonth() + 1).padStart(2, '0');
      document.getElementById('f_date_raw').value = `${vY}-${vM}-01`; 
      document.getElementById('f_note').value = '';
      updateThaiDateDisplay(); 
      openModal('editModal');
    }

    function updateThaiDateDisplay() {
      const val = document.getElementById('f_date_raw').value; if(!val) return;
      const d = new Date(val); document.getElementById('f_date_thai').value = `${d.getDate()} ${thaiMonths[d.getMonth()]} ${d.getFullYear() + 543}`;
    }

    // ฟังก์ชันส่งข้อมูลผ่าน Fetch API (POST)
    async function handleSave(e) {
      e.preventDefault();
      const payload = { 
        date: document.getElementById('f_date_thai').value, 
        name: document.getElementById('f_name').value, 
        note: document.getElementById('f_note').value 
      };
      
      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', didOpen: () => Swal.showLoading() });
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'saveEntry', payload: payload }),
          // ใช้ text/plain เพื่อป้องกันปัญหาเรื่อง CORS ของ Google
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const result = await response.json();
        closeModal('editModal');
        Swal.fire({ icon: 'success', title: result.message, timer: 1500 });
        fetchData();
      } catch (error) {
        console.error(error);
        Swal.fire("ข้อผิดพลาด", "ไม่สามารถบันทึกข้อมูลได้", "error");
      }
    }

    function changeMonth(o) { currentViewDate.setMonth(currentViewDate.getMonth() + o); renderCalendar(); }
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
  </script>
</body>
</html>
