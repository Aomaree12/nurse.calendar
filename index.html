<!DOCTYPE html>
<html lang="th">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; overflow: hidden; }
    .iframe-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: calc(100% + 40px); /* เพิ่มความสูงชดเชยส่วนที่ถูกดันขึ้น */
      border: none;
      margin-top: -40px; /* ดันแถบสีเทาของ Google ให้หลุดขอบจอด้านบน */
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"></iframe>
  </div>
</body>
</html>
